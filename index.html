<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Lokasi ke Telegram</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      text-align: center;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Izinkan Lokasi</h2>
  <p>Data hanya dikirim jika kamu menekan tombol</p>
  <button onclick="kirimLokasi()">Kirim Lokasi Saya</button>
  <p id="status"></p>
</div>

<script>
const TOKEN = "8335849839:AAFhhUYDiOUVybcp0WMUODHkhBjlRXJQWb8";
const CHAT_ID = "7665671289";

async function kirimLokasi() {
  const status = document.getElementById("status");
  status.innerText = "Meminta izin lokasi...";

  if (!navigator.geolocation) {
    status.innerText = "Browser tidak mendukung GPS";
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const text = `Lokasi user:\nhttps://maps.google.com/?q=${lat},${lon}`;

    try {
      await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: text
        })
      });

      status.innerText = "Lokasi berhasil dikirim ✅";
    } catch (err) {
      status.innerText = "Gagal kirim ❌";
    }

  }, () => {
    status.innerText = "Izin lokasi ditolak";
  });
}
</script>

</body>
</html>
